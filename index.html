<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin Arth | Finance Insights</title>
    <style>
        :root {
            --primary-bg: #f4f9f4; /* Soft green-tinted background */
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #555555;
            --button-bg: #1e5631; /* Dark green matching your logo */
            --button-hover: #143d22;
            --button-text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-img {
            display: block;
            width: 160px; /* Adjusted to fit your logo perfectly */
            height: auto;
            margin: 0 auto 20px;
            object-fit: contain;
        }

        h1 {
            /* Hidden because the logo already contains the text "FIN ARTH" */
            display: none; 
        }

        p {
            color: var(--text-muted);
            margin: 0 0 30px;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 500;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .link-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        /* Specific Button Colors */
        .link-btn.x-btn { background-color: #000000; }
        .link-btn.x-btn:hover { background-color: #333333; }
        
        .link-btn.email-btn { background-color: #0078D4; }
        .link-btn.email-btn:hover { background-color: #005a9e; }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your uploaded logo image -->
        <img src="Image.jpg" alt="Fin Arth Logo" class="profile-img">
        
        <p>Stock market | Current affairs | Personal Finance 💰</p>

        <div class="links">
            <a href="https://www.youtube.com/@Fin_Arth" target="_blank" class="link-btn">
                ▶ YouTube
            </a>
            <a href="https://x.com/fin_arth?s=11" target="_blank" class="link-btn x-btn">
                𝕏 X (Twitter)
            </a>
            <a href="https://www.instagram.com/fin.arth" target="_blank" class="link-btn">
                📷 Instagram
            </a>
            <a href="mailto:fin.arth@outlook.com" class="link-btn email-btn">
                ✉ Contact via Email
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Fin Arth. All rights reserved.
        </div>
    </div>

</body>
</html>
