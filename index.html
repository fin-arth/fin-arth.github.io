<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin Arth | Finance Insights</title>
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --button-bg: #212529;
            --button-hover: #343a40;
            --button-text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            /* Replace the background color with a background-image URL to add your logo */
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            margin: 0 0 30px;
            font-size: 15px;
            line-height: 1.5;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 14px 20px;
            background-color: var(--button-bg);
            color: var(--button-text);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .link-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Add your logo image here -->
        <div class="profile-img">FA</div>
        
        <h1>Fin Arth</h1>
        <p>Demystifying finance. Insights on markets, wealth, and personal finance.</p>

        <div class="links">
            <a href="https://www.youtube.com/@Fin_Arth" target="_blank" class="link-btn">YouTube</a>
            <a href="https://x.com/fin_arth?s=11" target="_blank" class="link-btn">X (Twitter)</a>
            <a href="https://www.instagram.com/fin.arth" target="_blank" class="link-btn">Instagram</a>
            <a href="mailto:fin.arth@outlook.com" class="link-btn" style="background-color: #0078D4;">Contact via Email</a>
        </div>

        <div class="footer">
            &copy; 2026 Fin Arth. All rights reserved.
        </div>
    </div>

</body>
</html>
